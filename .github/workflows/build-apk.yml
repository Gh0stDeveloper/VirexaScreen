name: Construir APK Release

on:
  push:
    branches: ["main"]
    
permissions:
  contents: write

jobs:
  build:
    name: Compilar APK Release
    runs-on: ubuntu-latest

    steps:
      - name: ⬇️ Descargar código
        uses: actions/checkout@v4

      - name: ☕ Configurar JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: "temurin"
          java-version: "17"

      - name: 🔐 Restaurar keystore
        run: |
          echo "${{ secrets.KEYSTORE_BASE64 }}" | base64 --decode > app/ghostnexora-release.jks

      - name: 🧪 Verificar keystore
        run: |
          ls -lh app/ghostnexora-release.jks
          keytool -list \
            -v \
            -keystore app/ghostnexora-release.jks \
            -storepass "${{ secrets.KEYSTORE_PASSWORD }}" \
            -alias "${{ secrets.KEY_ALIAS }}"

      - name: ⚙️ Crear local.properties
        run: |
          echo "sdk.dir=$ANDROID_SDK_ROOT" > local.properties

      - name: 🔧 Dar permisos a gradlew
        run: chmod +x ./gradlew

      - name: 🛠️ Compilar APK Release
        env:
          KEYSTORE_FILE: ${{ github.workspace }}/app/ghostnexora-release.jks
          KEYSTORE_PASSWORD: ${{ secrets.KEYSTORE_PASSWORD }}
          KEY_ALIAS: ${{ secrets.KEY_ALIAS }}
          KEY_PASSWORD: ${{ secrets.KEY_PASSWORD }}
        run: ./gradlew assembleRelease --stacktrace

      # ⬇️ Aquí creas el release y adjuntas el APK
      - name: 🚀 Crear Release y subir APK
        uses: softprops/action-gh-release@v2
        with:
          files: app/build/outputs/apk/release/*.apk
          tag_name: release-${{ github.run_number }}
          name: Release ${{ github.run_number }}
          body: |
            Construcción automática desde el commit `${{ github.sha }}`
            Ejecución #${{ github.run_number }}
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}